# Synology / GHCR: fertige Images pullen – kein lokaler Build.
# Start: docker compose --env-file .env.synology -f docker-compose.synology.yml up -d

services:
  backend:
    image: ghcr.io/sldna/dynalabs-aquadiag-backend:latest
    container_name: aquadiag-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    env_file:
      - .env.synology
    environment:
      DATABASE_PATH: /data/aquadiag.db
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-8}
    volumes:
      - aquadiag-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  frontend:
    image: ghcr.io/sldna/dynalabs-aquadiag-frontend:latest
    container_name: aquadiag-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file:
      - .env.synology
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      # Server-Proxy (/api/backend) → Backend-Container (kein CORS nötig)
      API_INTERNAL_BASE_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy

volumes:
  aquadiag-data:
